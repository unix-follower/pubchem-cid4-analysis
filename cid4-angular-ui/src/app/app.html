<div class="shell">
  <header class="masthead">
    <div>
      <p class="eyebrow">CID 4 Interactive Lab</p>
      <a class="brand" routerLink="/data-structures">CID 4 Analysis Studio</a>
    </div>

    <nav class="primary-nav" aria-label="Primary">
      <a
        routerLink="/data-structures"
        routerLinkActive="active"
        [routerLinkActiveOptions]="{ exact: true }"
      >
        Data Structures
      </a>
      <a
        routerLink="/algorithms"
        routerLinkActive="active"
        [routerLinkActiveOptions]="{ exact: true }"
      >
        Algorithms
      </a>
      <a routerLink="/auth" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: false }">
        Chatbot
      </a>
    </nav>
  </header>

  <main class="content-frame">
    <router-outlet></router-outlet>
  </main>
</div>
