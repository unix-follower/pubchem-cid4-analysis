name: Build nltk app
on:
  pull_request:
    paths:
      - .github/workflows/build-cid4-nltk.yaml
      - cid4-nltk/**
    types:
      - opened
      - reopened
      - synchronize
  workflow_dispatch:
    inputs:
      python-version:
        description: Desired python version
        required: false
        default: "3.12"

env:
  PYTHON_VERSION: ${{ inputs.python-version || '3.12' }}

jobs:
  build:
    runs-on:
      - ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
        
      - name: Install dependencies
        working-directory: cid4-nltk
        shell: bash
        run: |
          python -m pip install uv
          uv sync --locked

      - name: Check code formatting
        working-directory: cid4-nltk
        shell: bash
        run: uv tool run ruff check

      - name: Run unit tests
        working-directory: cid4-nltk
        shell: bash
        run: uv run python -m unittest discover -s tests -v

      - name: Build python app
        working-directory: cid4-nltk
        shell: bash
        run: uv build
