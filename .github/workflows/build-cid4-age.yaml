name: Build AGE app
on:
  pull_request:
    paths:
      - .github/workflows/build-cid4-age.yaml
      - cid4-age/**
    types:
      - opened
      - reopened
      - synchronize
  workflow_dispatch:
    inputs:
      python-version:
        description: Desired python version
        required: false
        default: "3.12"

env:
  PYTHON_VERSION: ${{ inputs.python-version || '3.12' }}

jobs:
  build:
    runs-on:
      - ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Setup micromamba environment
        uses: mamba-org/setup-micromamba@v2
        with:
          micromamba-binary-path: cid4-age
          environment-name: cid4-age
          create-args: >-
            -c conda-forge
            -p ./.micromamba/cid4_age
            python=3.12
            rdkit
          cache-environment: true
          init-shell: bash
        
      - name: Install dependencies
        working-directory: cid4-age
        shell: bash
        run: |
          source ./.micromamba/cid4_age/bin/activate
          pip install uv
          
          uv venv --python ./.micromamba/cid4_age/bin/python --system-site-packages .venv
          source .venv/bin/activate
          uv sync --locked

      - name: Check code formatting
        working-directory: cid4-age
        shell: bash
        run: uv tool run ruff check

      - name: Run unit tests
        working-directory: cid4-age
        shell: bash
        run: uv run python -m unittest discover -s tests -v

      - name: Build python app
        working-directory: cid4-age
        shell: bash
        run: uv build
