name: Build C++ app
on:
  pull_request:
    paths:
      - .github/workflows/build-cpp.yaml
      - cpp/**
    types:
      - opened
      - reopened
      - synchronize

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      # Install latest CMake and Ninja.
      - uses: lukka/get-cmake@latest
      # Setup vcpkg: ensures vcpkg is downloaded and built.
      # Since vcpkg.json is being used later on to install the packages
      # when `run-cmake` runs, no packages are installed at this time
      # (and vcpkg does not run).
      - name: Setup new (or from cache) vcpkg (and does not build any package)
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: fc349a7b35348173d4d24621ae04ad80e2375957

      - name: Setup micromamba RDKit environment
        uses: mamba-org/setup-micromamba@v2
        with:
          environment-name: rdkit
          create-args: >-
            -c conda-forge
            librdkit-dev
            libboost-devel
          cache-environment: true
          init-shell: bash

      - name: Export RDKit prefix
        shell: bash -el {0}
        run: echo "PUBCHEM_RDKIT_PREFIX=$MAMBA_ROOT_PREFIX/envs/rdkit" >> "$GITHUB_ENV"

      - name: Run CMake consuming CMakePreset.json and run vcpkg to build packages
        uses: lukka/run-cmake@v10
        with:
          cmakeListsTxtPath: cpp/CMakeLists.txt
          # This is the name of the CMakePresets.json's configuration to use to generate
          # the project files. This configuration leverages the vcpkg.cmake toolchain file to
          # run vcpkg and install all dependencies specified in vcpkg.json.
          configurePreset: vcpkg
          # This is the name of the CMakePresets.json's configuration to build the project.
          buildPreset: vcpkg
          testPreset: vcpkg
