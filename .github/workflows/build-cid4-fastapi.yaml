name: Build Fastapi app
on:
  pull_request:
    paths:
      - .github/workflows/build-cid4-fastapi.yaml
      - cid4-fastapi/**
    types:
      - opened
      - reopened
      - synchronize
  workflow_dispatch:
    inputs:
      python-version:
        description: Desired python version
        required: false
        default: "3.12"

env:
  PYTHON_VERSION: ${{ inputs.python-version || '3.12' }}

jobs:
  build:
    runs-on:
      - ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Setup micromamba RDKit environment
        uses: mamba-org/setup-micromamba@v2
        with:
          environment-name: fastapi-app
          create-args: >-
            -c conda-forge
            rdkit tensorflow pytorch pytorch::torchvision
          cache-environment: true
          init-shell: bash

      - name: Install dependencies
        working-directory: cid4-fastapi
        shell: bash
        run: |
          prefix=$(micromamba env list | awk '$1 == "fastapi-app" {print $NF}')
          pip install uv
          uv pip install --python "$prefix/bin/python3" -e .
          ln -s $prefix .venv      

      - name: Check code formatting
        working-directory: cid4-fastapi
        shell: bash
        run: uv tool run ruff check

      - name: Run unit tests
        working-directory: cid4-fastapi
        shell: bash
        run: |
          export DATA_DIR="$(pwd)/../data"
          uv run python -m unittest discover -s tests -v

      - name: Build python app
        working-directory: cid4-fastapi
        shell: bash
        run: uv build
