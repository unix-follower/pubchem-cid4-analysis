# CID4 Scala Tomcat security toggles
# Enable at most one auth mode at a time.

security.cors.enabled=false
security.cors.allowedOrigins=
security.cors.allowedMethods=GET,OPTIONS
security.cors.allowedHeaders=Authorization,Content-Type

security.xssHeaders.enabled=false
security.csrf.enabled=false
security.ssrf.enabled=false
security.ssrf.allowedSchemes=http,https
security.ssrf.allowedHosts=
security.ssrf.allowedPorts=
security.ssrf.allowPrivateNetworks=false

security.auth.oauth2.enabled=false
security.auth.oauth2.issuer=
security.auth.oauth2.audience=
security.auth.oauth2.jwksUri=
security.auth.oauth2.realm=CID4 API

security.auth.basic.enabled=false
security.auth.basic.realm=CID4 Basic Realm
security.auth.basic.username=
security.auth.basic.password=

security.auth.digest.enabled=false
security.auth.digest.realm=CID4 Digest Realm
security.auth.digest.username=
security.auth.digest.password=
security.auth.digest.nonceTtlSeconds=300
